<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Obraty BA Obchodná — prototyp</title>
<style>
  :root{
    --bg:#f2ede4; --panel:rgba(255,255,255,.85); --border:rgba(150,120,80,.18);
    --borderM:rgba(150,120,80,.35); --gold:#b87020; --goldDim:rgba(184,112,32,.12);
    --text:#1e1608; --sub:#6b5d4f; --muted:#a09080; --ok:#2a9a55; --okDim:rgba(42,154,85,.10);
    --err:#d03030; --errDim:rgba(208,48,48,.10); --blue:#1a6fa8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:15px}
  .wrap{max-width:640px; margin:0 auto; padding:12px 12px 90px}
  h1{font-size:18px; margin:10px 4px 2px; display:flex; align-items:center; gap:8px}
  h1 .hex{color:var(--gold)}
  .sub{color:var(--sub); font-size:12px; margin:0 4px 12px}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:14px; margin-bottom:12px; backdrop-filter:blur(6px)}
  .tag{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold);
    font-weight:700; margin-bottom:8px}
  /* tabs */
  .tabs{position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,.95);
    border-top:1px solid var(--borderM); display:flex; z-index:50; backdrop-filter:blur(8px)}
  .tabs button{flex:1; border:0; background:none; padding:10px 2px 12px; font-size:11px;
    color:var(--muted); cursor:pointer; font-weight:600}
  .tabs button.on{color:var(--gold)}
  .tabs button span{display:block; font-size:18px; margin-bottom:2px}
  /* segmented */
  .seg{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .seg button{flex:1; min-width:70px; border:1px solid var(--borderM); background:#fff;
    border-radius:10px; padding:9px 6px; font-size:13px; font-weight:600; color:var(--sub); cursor:pointer}
  .seg button.on{background:var(--gold); border-color:var(--gold); color:#fff}
  /* fields */
  .frow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0;
    border-bottom:1px dashed var(--border)}
  .frow:last-child{border-bottom:0}
  .frow label{font-size:13px; color:var(--sub); flex:1; line-height:1.25}
  .frow input[type=number],.frow input[type=text]{width:130px; padding:9px 10px; border:1px solid var(--borderM);
    border-radius:9px; font-size:16px; text-align:right; background:#fff; color:var(--text)}
  .frow input:focus{outline:2px solid var(--gold); border-color:var(--gold)}
  .frow input[type=text]{text-align:left}
  input[type=date],input[type=month]{padding:9px 10px; border:1px solid var(--borderM); border-radius:9px;
    font-size:15px; background:#fff; color:var(--text); width:100%}
  /* computed */
  .comp{display:flex; align-items:center; justify-content:space-between; padding:7px 0;
    border-bottom:1px dashed var(--border); font-size:13px}
  .comp:last-child{border-bottom:0}
  .comp b{font-size:15px; font-variant-numeric:tabular-nums}
  .comp .neg{color:var(--err)} .comp .pos{color:var(--ok)}
  .hint{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.4}
  /* tables */
  .tbl{width:100%; border-collapse:collapse; font-size:12px}
  .tbl th{color:var(--sub); font-weight:600; text-align:right; padding:5px 6px;
    border-bottom:1px solid var(--borderM); white-space:nowrap}
  .tbl td{padding:5px 6px; text-align:right; border-bottom:1px solid var(--border);
    font-variant-numeric:tabular-nums; white-space:nowrap}
  .tbl th:first-child,.tbl td:first-child{text-align:left}
  .tbl tr.sum td{font-weight:700; border-top:2px solid var(--borderM); background:var(--goldDim)}
  .tbl tr.wknd td{background:rgba(184,112,32,.05)}
  .tblwrap{overflow-x:auto; margin:0 -6px}
  .dim{color:var(--muted)}
  /* buttons */
  .btn{display:inline-block; border:1px solid var(--gold); background:var(--gold); color:#fff;
    border-radius:10px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer}
  .btn.ghost{background:#fff; color:var(--gold)}
  .btn.sm{padding:6px 10px; font-size:12px; border-radius:8px}
  .btn.red{background:var(--err); border-color:var(--err)}
  .rowflex{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .blokrow{display:grid; grid-template-columns:110px 90px 1fr 30px; gap:6px; margin-bottom:6px}
  .blokrow input{padding:8px; border:1px solid var(--borderM); border-radius:8px; font-size:13px; width:100%}
  .blokrow button{border:0; background:none; color:var(--err); font-size:16px; cursor:pointer}
  .ok-pill{display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:700}
  .ok-pill.ok{background:var(--okDim); color:var(--ok)}
  .ok-pill.err{background:var(--errDim); color:var(--err)}
  .daynav{display:flex; gap:8px; align-items:center; margin-bottom:10px}
  .daynav button{border:1px solid var(--borderM); background:#fff; border-radius:9px; width:42px; height:42px;
    font-size:17px; cursor:pointer; color:var(--gold); flex:none}
  .dayname{font-size:12px; color:var(--sub); text-align:center; margin:-4px 0 8px}
  .secthead{font-size:13px; font-weight:700; color:var(--text); margin:12px 0 2px;
    padding-top:8px; border-top:2px solid var(--borderM)}
  .secthead:first-child{border-top:0; margin-top:0; padding-top:0}
  /* OCR doklad */
  .ocrdrop{border:2px dashed var(--borderM); border-radius:12px; padding:16px; text-align:center;
    color:var(--sub); cursor:pointer; background:rgba(184,112,32,.04)}
  .ocrdrop b{color:var(--gold)}
  .ocr-prog{height:8px; border-radius:99px; background:var(--goldDim); overflow:hidden; margin:10px 0}
  .ocr-prog>div{height:100%; background:var(--gold); transition:width .2s}
  .ocr-field{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px dashed var(--border)}
  .ocr-field:last-child{border-bottom:0}
  .ocr-field label{flex:1; font-size:13px; color:var(--sub)}
  .ocr-field input[type=number]{width:110px; padding:7px 9px; border:1px solid var(--borderM);
    border-radius:8px; font-size:15px; text-align:right; background:#fff}
  .ocr-field input[type=checkbox]{width:20px; height:20px; accent-color:var(--gold)}
  .ocr-field.miss input[type=number]{border-style:dashed; color:var(--muted)}
  .ocr-raw{font-size:11px; white-space:pre-wrap; color:var(--muted); max-height:150px; overflow:auto;
    background:rgba(0,0,0,.03); padding:8px; border-radius:8px; margin-top:8px; font-family:monospace}
  .ocr-thumb{max-width:100%; max-height:180px; border-radius:10px; margin-top:8px; display:block}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="hex">⬡</span> Obraty — BA Obchodná <span style="font-size:11px;color:var(--muted);font-weight:400">prototyp</span></h1>
  <p class="sub">KK + OO + FXF · denné zápisy uzávierok pokladní</p>
  <div id="view"></div>
</div>
<div class="tabs" id="tabs"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
'use strict';
/* ============================== KONFIGURÁCIA ============================== */
const DNI = ['nedeľa','pondelok','utorok','streda','štvrtok','piatok','sobota'];
const MESIACE = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];

// Vstupné polia z dennej uzávierky pokladne (presne podľa Excelu)
const F_PREDAJ = [   // blok „predajná pokladňa" — KK POS aj OO A3 strana
  ['obrat',      'Celkový obrat'],
  ['zaokr',      'Zaokrúhlenie'],
  ['karta',      'Platobná karta (ANS)'],
  ['darcek',     'Darčekové karty (Doxx, Up, Callio)'],
  ['dpPouk',     'Darčekové poukážky'],
  ['dpMartinus', 'DP – Martinus'],
  ['dpEticket',  'DP – Eticket'],
  ['odvod',      'Odvod KK'],
];
const F_FAKTURY = [  // blok „úhrady faktúr" — OO strana
  ['uhrHot',      'Úhrada faktúr – hotovosť'],
  ['uhrZaokr',    'Úhrada faktúr – zaokrúhlenie'],
  ['uhrKarta',    'Úhrada faktúr – karta'],
  ['darcek2',     'Darčekové karty'],
  ['dpPouk2',     'Darčekové poukážky'],
  ['dpMartinus2', 'DP – Martinus'],
  ['dpEticket2',  'DP – Eticket'],
  ['odvodOO',     'Odvod OO'],
];
const F_FXF = [
  ['obrat',          'Celkový obrat'],
  ['zaokr',          'Zaokrúhlenie'],
  ['karta',          'Platobná karta'],
  ['upKarta',        'Darčekové karty (UP)'],
  ['qerko',          'Qerko'],
  ['tringelty',      'Qerko – tringelty'],
  ['gastro',         'Gastro lístky'],
  ['odvod',          'Odvod pokladne'],
  ['nakupy',         'Nákupy (celková suma)'],
  ['prevodMalaKasa', 'Prevod na malú kasu'],
  ['vklad',          'Vklad do pokladne'],
  ['vkladBanka',     'Vklad do banky'],
];

const UNITS = {
  KK:  { label:'KK',  registers:[
          {id:'POS1', label:'A3 POS 1-7'}, {id:'POS2', label:'A3 POS 2-7'},
          {id:'POS3', label:'A3 POS 3-7'}, {id:'POS4', label:'A3 POS 4-7'},
          {id:'POS5', label:'A3 POS 5-7'} ],
        dayFields:[ ['prevodOffice','Prevod hotovosti pre BA office'], ['vkladBanka','Vklad do banky (KK)'] ] },
  OO:  { label:'OO',  registers:[
          {id:'RP1', label:'RP 1'}, {id:'RP2', label:'RP 2'}, {id:'RP3', label:'RP 3'} ],
        dayFields:[ ['vkladBankaOO','Vklad do banky (OO)'] ] },
  FXF: { label:'FXF', registers:[ {id:'FX15', label:'FX15'} ], dayFields:[] },
};

/* ============================== STAV + ULOŽENIE ============================== */
const LS_KEY = 'fxf-obraty-v1';
let S = load();
function load(){
  try{ const s = JSON.parse(localStorage.getItem(LS_KEY)); if(s && s.entries) return s; }catch(e){}
  return {
    entries:{},          // "UNIT|REG|YYYY-MM-DD" -> {pole:hodnota}
    days:{},             // "UNIT|YYYY-MM-DD"     -> denné polia (prevod office, vklad banka…)
    blocky:{},           // "UNIT|YYYY-MM"        -> [{datum,suma,ucel}]
    monthMeta:{},        // "UNIT|YYYY-MM"        -> {rozmienanie, neodvedene}
    settings:{
      startMonth: iso(new Date()).slice(0,7),
      openingDrawer:{},  // drawerKey -> €  (stav zásuvky pred prvým mesiacom)
      openingCash:{KK:0, OO:0, FXF:0, MALAKASA:0},  // stav hotovosti na prevádzke pred prvým mesiacom
    },
  };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }
const N = v => { const x = parseFloat(v); return isFinite(x) ? x : 0; };
const E = (u,r,d) => S.entries[`${u}|${r}|${d}`] || {};
const D = (u,d)   => S.days[`${u}|${d}`] || {};
const g = (o,f)   => N(o[f]);
function setE(u,r,d,f,v){ const k=`${u}|${r}|${d}`; if(!S.entries[k]) S.entries[k]={}; S.entries[k][f]=v; save(); }
function setD(u,d,f,v){ const k=`${u}|${d}`; if(!S.days[k]) S.days[k]={}; S.days[k][f]=v; save(); }

/* ============================== DÁTUMY ============================== */
function iso(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function daysInMonth(ym){ const [y,m]=ym.split('-').map(Number); return new Date(y,m,0).getDate(); }
function monthDates(ym){ const n=daysInMonth(ym); return Array.from({length:n},(_,i)=>`${ym}-${String(i+1).padStart(2,'0')}`); }
function addMonths(ym,k){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-1+k,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(ym){ const [y,m]=ym.split('-').map(Number); return `${MESIACE[m-1]} ${y}`; }
const fmt = v => ((Math.round(v*100)/100) || 0).toLocaleString('sk-SK',{minimumFractionDigits:2, maximumFractionDigits:2})+' €';

/* ============================== VÝPOČTY (vzorce z Excelu) ============================== */
// Predajná pokladňa (KK POS / OO A3):  H = F − I − L + G ;  L = M+N+O ;  terminál = I − J
function calcPredaj(e){
  const dpSpolu  = g(e,'dpPouk') + g(e,'dpMartinus') + g(e,'dpEticket');
  const hotovost = g(e,'obrat') - g(e,'karta') - dpSpolu + g(e,'zaokr');
  const terminal = g(e,'karta') - g(e,'darcek');
  return {dpSpolu, hotovost, terminal};
}
// OO strana (faktúry):  X = P + R + T − Q ;  T = U+V+W
function calcFaktury(e){
  const dpSpolu  = g(e,'dpPouk2') + g(e,'dpMartinus2') + g(e,'dpEticket2');
  const eshop    = g(e,'uhrHot') + g(e,'uhrKarta') + dpSpolu - g(e,'uhrZaokr');
  return {dpSpolu, eshop};
}
// FXF:  J = H − K − P + I − N − O ;  M = K − L
function calcFXF(e){
  const hotovost   = g(e,'obrat') - g(e,'karta') - g(e,'gastro') + g(e,'zaokr') - g(e,'qerko') - g(e,'tringelty');
  const kartaBezUp = g(e,'karta') - g(e,'upKarta');
  return {hotovost, kartaBezUp};
}
// Nákupy KK v daný deň = súčet bločkov s daným dátumom (v Exceli ručný stĺpec AB)
function nakupyDna(unit, date){
  const ym = date.slice(0,7);
  return (S.blocky[`${unit}|${ym}`]||[]).filter(b=>b.datum===date).reduce((s,b)=>s+N(b.suma),0);
}
// Denná zmena zásuvky (vzorce stĺpcov E/Q/AD/AP/BB, Z/AA, G)
function drawerDelta(drawerKey, date){
  const [unit, reg, side] = drawerKey.split('|');
  if(unit==='KK'){
    const e=E('KK',reg,date), c=calcPredaj(e);
    let d = c.hotovost - g(e,'odvod');
    if(reg==='POS3') d -= nakupyDna('KK', date);   // nákupy idú z pokladne POS 3-7 (stĺpec AD)
    return d;
  }
  if(unit==='OO'){
    const e=E('OO',reg,date);
    if(side==='A3') return calcPredaj(e).hotovost - g(e,'odvod');     // Z = Z−1 + G − C
    return g(e,'uhrHot') - g(e,'odvodOO');                            // AA = AA−1 + P − O
  }
  if(unit==='FXF'){
    if(reg==='MALAKASA'){
      const e=E('FXF','FX15',date);
      return g(e,'prevodMalaKasa') - nakupyDna('FXF', date);
    }
    const e=E('FXF',reg,date), c=calcFXF(e);
    return c.hotovost - g(e,'nakupy') - g(e,'odvod') + g(e,'vklad');  // G = G−1 + J − E − D + Q
  }
  return 0;
}
const DRAWERS = [
  {key:'KK|POS1', label:'KK · A3 POS 1-7'}, {key:'KK|POS2', label:'KK · A3 POS 2-7'},
  {key:'KK|POS3', label:'KK · A3 POS 3-7'}, {key:'KK|POS4', label:'KK · A3 POS 4-7'},
  {key:'KK|POS5', label:'KK · A3 POS 5-7'},
  {key:'OO|RP1|A3', label:'OO · RP1 (A3 predaj)'}, {key:'OO|RP1|OO', label:'OO · RP1 (faktúry)'},
  {key:'OO|RP2|A3', label:'OO · RP2 (A3 predaj)'}, {key:'OO|RP2|OO', label:'OO · RP2 (faktúry)'},
  {key:'OO|RP3|A3', label:'OO · RP3 (A3 predaj)'}, {key:'OO|RP3|OO', label:'OO · RP3 (faktúry)'},
  {key:'FXF|FX15', label:'FXF · FX15'}, {key:'FXF|MALAKASA', label:'FXF · malá kasa'},
];
// Stav zásuvky ku koncu dňa = počiatočný stav + súčet denných zmien od začiatku evidencie
function drawerBalance(drawerKey, uptoDate){
  let bal = N(S.settings.openingDrawer[drawerKey]);
  const start = S.settings.startMonth + '-01';
  for(let d = new Date(start+'T00:00'); iso(d) <= uptoDate; d.setDate(d.getDate()+1)){
    bal += drawerDelta(drawerKey, iso(d));
  }
  return bal;
}

/* ---- denné súčty naprieč pokladňami (stĺpce C a BN v KK hárku) ---- */
function obratCelkomDna(date){  // C = 5× KK obrat + 3× OO A3 obrat + … (FXF vedie Excel zvlášť)
  let s = 0;
  for(const r of UNITS.KK.registers) s += g(E('KK',r.id,date),'obrat');
  for(const r of UNITS.OO.registers) s += g(E('OO',r.id,date),'obrat');
  return s;
}
function odvodKKDna(date){      // BN = 5× KK odvod + 3× OO odvod KK − prevod pre office
  let s = 0;
  for(const r of UNITS.KK.registers) s += g(E('KK',r.id,date),'odvod');
  for(const r of UNITS.OO.registers) s += g(E('OO',r.id,date),'odvod');
  return s - g(D('KK',date),'prevodOffice');
}

/* ---- mesačná uzávierka (riadky 36–42 v Exceli) ---- */
function sumMonth(fn, ym){ return monthDates(ym).reduce((s,d)=>s+fn(d),0); }
function uzavierkaKK(ym){
  const hotovost = sumMonth(d=>{
    let s=0;
    for(const r of UNITS.KK.registers) s += calcPredaj(E('KK',r.id,d)).hotovost;
    for(const r of UNITS.OO.registers) s += calcPredaj(E('OO',r.id,d)).hotovost;
    return s;
  }, ym);
  const nakupy = (S.blocky['KK|'+ym]||[]).reduce((s,b)=>s+N(b.suma),0);
  const banka  = sumMonth(d=>g(D('KK',d),'vkladBanka'), ym);
  const prevod = sumMonth(d=>g(D('KK',d),'prevodOffice'), ym);
  const minuly = stavHotovosti('KK', addMonths(ym,-1));
  const stav   = minuly + hotovost - nakupy - banka - prevod;
  const last   = monthDates(ym).at(-1);
  const zasuvky = ['KK|POS1','KK|POS2','KK|POS3','KK|POS4','KK|POS5','OO|RP1|A3','OO|RP2|A3','OO|RP3|A3']
                  .reduce((s,k)=>s+drawerBalance(k,last),0);
  return {minuly, hotovost, nakupy, banka, prevod, stav, zasuvky};
}
function uzavierkaOO(ym){
  const hotovost = sumMonth(d=>UNITS.OO.registers.reduce((s,r)=>s+g(E('OO',r.id,d),'uhrHot'),0), ym);
  const banka  = sumMonth(d=>g(D('OO',d),'vkladBankaOO'), ym);
  const minuly = stavHotovosti('OO', addMonths(ym,-1));
  const stav   = minuly + hotovost - banka;
  const last   = monthDates(ym).at(-1);
  const zasuvky = ['OO|RP1|OO','OO|RP2|OO','OO|RP3|OO'].reduce((s,k)=>s+drawerBalance(k,last),0);
  return {minuly, hotovost, banka, stav, zasuvky, nakupy:0, prevod:0};
}
function uzavierkaFXF(ym){
  const hotovost = sumMonth(d=>calcFXF(E('FXF','FX15',d)).hotovost, ym);
  const nakupy = sumMonth(d=>g(E('FXF','FX15',d),'nakupy'), ym);
  const prevod = sumMonth(d=>g(E('FXF','FX15',d),'prevodMalaKasa'), ym);
  const banka  = sumMonth(d=>g(E('FXF','FX15',d),'vkladBanka'), ym);
  const minuly = stavHotovosti('FXF', addMonths(ym,-1));
  const stav   = minuly + hotovost - nakupy - banka - prevod;
  const last   = monthDates(ym).at(-1);
  return {minuly, hotovost, nakupy, banka, prevod, stav,
          zasuvky: drawerBalance('FXF|FX15', last),
          malaKasa: drawerBalance('FXF|MALAKASA', last)};
}
// „Stav hotovosti na prevádzke" — reťazí sa mesiac za mesiacom od počiatočného stavu
function stavHotovosti(unit, ym){
  if(ym < S.settings.startMonth) return N(S.settings.openingCash[unit]);
  const fn = unit==='KK' ? uzavierkaKK : unit==='OO' ? uzavierkaOO : uzavierkaFXF;
  return fn(ym).stav;
}

/* ============================== UI ============================== */
let UI = { tab:'zapis', date: iso(new Date()), unit:'KK', reg:'POS1',
           ym: iso(new Date()).slice(0,7), prehladUnit:'SPOLU', blokUnit:'KK', ocr:null };

const TABS = [
  ['zapis','✍️','Zápis'], ['prehlad','📊','Prehľad'], ['uzavierka','🧾','Uzávierka'],
  ['blocky','🧷','Bločky'], ['nastavenia','⚙️','Nastavenia'],
];
function renderTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(([id,ic,lb])=>
    `<button class="${UI.tab===id?'on':''}" onclick="go('${id}')"><span>${ic}</span>${lb}</button>`).join('');
}
function go(tab){ UI.tab=tab; render(); }
function render(){
  renderTabs();
  const v = document.getElementById('view');
  if(UI.tab==='zapis') v.innerHTML = vZapis();
  if(UI.tab==='prehlad') v.innerHTML = vPrehlad();
  if(UI.tab==='uzavierka') v.innerHTML = vUzavierka();
  if(UI.tab==='blocky') v.innerHTML = vBlocky();
  if(UI.tab==='nastavenia') v.innerHTML = vNastavenia();
}

/* ---------- ZÁPIS ---------- */
function inputRow(label, val, oninput, type='number'){
  const v = (val===undefined||val===null||val==='') ? '' : val;
  return `<div class="frow"><label>${label}</label>

/* ============================== OCR — NAHRANIE DOKLADU ============================== */
// Mapovanie: pre každé pole appky kľúčové slová, ktoré sa hľadajú na bločku.
// Diakritika sa ignoruje, porovnáva sa malými písmenami. Doladí sa podľa reálneho bločka.
const OCR_PREDAJ = [
  {f:'obrat',      keys:['celkovy obrat','celkova trzba','obrat','trzba','medzisucet']},
  {f:'zaokr',      keys:['zaokruhlenie','zaokr']},
  {f:'karta',      keys:['platobna karta','platba kartou','bezhotovost','karta']},
  {f:'darcek',     keys:['darcekove karty','doxx','callio','up karta']},
  {f:'dpPouk',     keys:['darcekove poukazky','poukazky']},
  {f:'dpMartinus', keys:['martinus']},
  {f:'dpEticket',  keys:['eticket','e-ticket']},
];
const OCR_FXF = [
  {f:'obrat',     keys:['celkovy obrat','celkova trzba','obrat','trzba','medzisucet']},
  {f:'zaokr',     keys:['zaokruhlenie','zaokr']},
  {f:'karta',     keys:['platobna karta','platba kartou','bezhotovost','karta']},
  {f:'upKarta',   keys:['up karta','darcekove karty','up ']},
  {f:'qerko',     keys:['qerko','querko']},
  {f:'tringelty', keys:['tringelt','prepitne','spropitne']},
  {f:'gastro',    keys:['gastro','stravne listky','stravne','edenred','dobre karty']},
];
function ocrMap(unit){ return unit==='FXF' ? OCR_FXF : OCR_PREDAJ; }
function labelOf(unit, f){
  const src = unit==='FXF' ? F_FXF : F_PREDAJ;
  const hit = src.find(x=>x[0]===f); return hit ? hit[1] : f;
}
const stripD = s => s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();
// Z riadku vytiahne peňažnú sumu (posledné číslo; podporuje "1 234,56", "1234.56", "1 234.56")
function parseAmount(line){
  const m = line.match(/-?\d[\d  .,]*\d|\d/g);
  if(!m) return null;
  let t = m[m.length-1].replace(/[  ]/g,'');
  if(t.includes(',') && t.includes('.')){
    t = (t.lastIndexOf(',') > t.lastIndexOf('.')) ? t.replace(/\./g,'').replace(',','.') : t.replace(/,/g,'');
  } else if(t.includes(',')){ t = t.replace(',','.'); }
  const v = parseFloat(t);
  return isFinite(v) ? Math.round(v*100)/100 : null;
}
function matchFields(text, unit){
  const lines = text.split(/\n+/).map(l=>l.trim()).filter(Boolean);
  return ocrMap(unit).map(({f,keys})=>{
    let value = null;
    for(const ln of lines){
      const norm = stripD(ln);
      if(keys.some(k=>norm.includes(k))){ const a=parseAmount(ln); if(a!==null){ value=a; break; } }
    }
    return {f, label:labelOf(unit,f), value, found:value!==null};
  });
}
function fileToImage(file){ return new Promise((res,rej)=>{ const img=new Image();
  img.onload=()=>res(img); img.onerror=rej; img.src=URL.createObjectURL(file); }); }
// Predspracovanie: zmenšenie + odtiene sivej + zvýšenie kontrastu (lepšie OCR na termo-bločku)
function preprocess(img){
  const max=1600, sc=Math.min(1, max/Math.max(img.width,img.height));
  const w=Math.round(img.width*sc), h=Math.round(img.height*sc);
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d'); x.drawImage(img,0,0,w,h);
  const d=x.getImageData(0,0,w,h), p=d.data;
  for(let i=0;i<p.length;i+=4){
    let g=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2];
    g=(g-128)*1.4+128;                 // kontrast
    g=g<0?0:g>255?255:g;
    p[i]=p[i+1]=p[i+2]=g;
  }
  x.putImageData(d,0,0); return c;
}
async function runOcr(input){
  const file = input.files && input.files[0]; if(!file) return;
  if(typeof Tesseract==='undefined'){
    alert('OCR engine sa nenačítal. Pri prvom použití treba internet (stiahne sa ~15 MB, potom funguje offline).'); return;
  }
  UI.ocr = {busy:true, progress:0, status:'Načítavam obrázok…', fields:[], raw:'', thumb:URL.createObjectURL(file), unit:UI.unit, reg:UI.reg, date:UI.date};
  renderOcr();
  try{
    const img = await fileToImage(file);
    const canvas = preprocess(img);
    UI.ocr.status='Rozpoznávam text…'; renderOcr();
    const {data} = await Tesseract.recognize(canvas, 'slk', {
      logger: m => { if(m.status==='recognizing text'){ UI.ocr.progress=Math.round(m.progress*100);
        UI.ocr.status='Rozpoznávam text… '+UI.ocr.progress+'%'; renderOcr(); } }
    });
    UI.ocr.raw = data.text || '';
    UI.ocr.fields = matchFields(UI.ocr.raw, UI.ocr.unit);
    UI.ocr.busy=false;
    const n = UI.ocr.fields.filter(x=>x.found).length;
    UI.ocr.status = n ? `Našiel som ${n} ${n===1?'pole':n<5?'polia':'polí'} — skontroluj a doplň.` : 'Nenašiel som sumy — skús ostrejšiu fotku alebo dopíš ručne.';
  }catch(e){ UI.ocr.busy=false; UI.ocr.status='Chyba OCR: '+e.message; }
  renderOcr();
}
function renderOcr(){ const el=document.getElementById('ocrCard'); if(el) el.innerHTML=ocrPanel(); }
function ocrPanel(){
  const o = UI.ocr;
  let h = `<div class="tag">📷 Nahrať doklad (OCR)</div>`;
  if(!o || (o.unit!==UI.unit || o.reg!==UI.reg || o.date!==UI.date)){
    h += `<label class="ocrdrop">
      <input type="file" accept="image/*" capture="environment" style="display:none" onchange="runOcr(this)">

  } else {

function applyOcr(){
  const o = UI.ocr; if(!o) return; let n=0;

  UI.ocr=null; render();

}
